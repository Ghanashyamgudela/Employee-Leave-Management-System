<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Face Recognition Attendance</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: 'Roboto', sans-serif;
    background-image: linear-gradient(-20deg, #ddd6f3 0%, #faaca8 100%, #faaca8 100%);
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:750px;
}

h2{
    color:#333;
    margin-bottom:20px;
}

.camera-frame{
    border:4px solid #4facfe;
    border-radius:10px;
    overflow:hidden;
}

.camera-frame img{
    width:100%;
}

.btn{
    margin-top:20px;
    padding:12px 25px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#2c8df4;
}

.status{
    margin-top:15px;
    color:green;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Face Recognition Attendance</h2>

<div class="camera-frame">
    <video id="video" width="700" autoplay playsinline></video>
</div>

<div class="status" id="status">Camera Active - Please look at the camera</div>

<br>

<button id="markBtn" class="btn">Face Attendance</button>
&nbsp;
<a href="{{ url_for('stop_camera') }}">
    <button class="btn">Back to Dashboard</button>
</a>

<script>
const video = document.getElementById('video');
const statusEl = document.getElementById('status');
let streamTracks = [];

async function startCamera(){
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = s;
        streamTracks = s.getTracks();
    } catch (err) {
        statusEl.style.color = 'red';
        statusEl.textContent = 'Unable to access camera';
    }
}

function stopCamera(){
    try { streamTracks.forEach(t=>t.stop()); } catch(e){}
}

async function captureFrameAsDataURL(){
    const w = video.videoWidth || 640;
    const h = video.videoHeight || 480;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);
    return c.toDataURL('image/jpeg', 0.9);
}

document.getElementById('markBtn').addEventListener('click', async function(){
    statusEl.style.color = 'black';
    statusEl.textContent = 'Checking...';
    try {
        const dataURL = await captureFrameAsDataURL();
        const resp = await fetch('/mark_attendance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataURL })
        });
        const j = await resp.json();
        if(j.ok){
            statusEl.style.color = 'green';
            statusEl.textContent = j.msg;
        } else {
            statusEl.style.color = 'red';
            statusEl.textContent = j.msg || 'Not recognized';
            if(j.predictions) statusEl.textContent += ' | ' + j.predictions.map(p=>p.id+" ("+p.confidence.toFixed(1)+")").join(', ');
        }
    } catch (e) {
        statusEl.style.color = 'red';
        statusEl.textContent = 'Error marking attendance';
    }
});

window.addEventListener('beforeunload', function () { stopCamera(); });
startCamera();
</script>

</div>

</body>
</html>
