<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Face Recognition Attendance</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: 'Roboto', sans-serif;
    background-image: linear-gradient(-20deg, #ddd6f3 0%, #faaca8 100%, #faaca8 100%);
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:750px;
}

h2{
    color:#333;
    margin-bottom:20px;
}

.camera-frame{
    border:4px solid #4facfe;
    border-radius:10px;
    overflow:hidden;
}

.camera-frame img{
    width:100%;
}

.btn{
    margin-top:20px;
    padding:12px 25px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#2c8df4;
}

.status{
    margin-top:15px;
    color:green;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Face Recognition Attendance</h2>

<div class="camera-frame">
<img src="{{ url_for('video') }}" width="700">
</div>

<div class="status">
Camera Active - Please look at the camera
</div>

<br>

<button id="markBtn" class="btn">Face Attendance</button>
&nbsp;
<a href="{{ url_for('stop_camera') }}">
<button class="btn">Back to Dashboard</button>
</a>

<script>
document.getElementById('markBtn').addEventListener('click', function(){
    var statusEl = document.querySelector('.status');
    statusEl.textContent = 'Checking...';
    fetch('/mark_attendance', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
        if(data.ok){
            statusEl.style.color = 'green';
            statusEl.textContent = data.msg;
        } else {
            statusEl.style.color = 'red';
            statusEl.textContent = data.msg;
            if(data.predictions){
                statusEl.textContent += ' | Predictions: ' + data.predictions.map(p=>p.id+" ("+p.confidence.toFixed(1)+")").join(', ');
            }
        }
    }).catch(err => {
        statusEl.style.color = 'red';
        statusEl.textContent = 'Error marking attendance';
    });
});

// Ensure camera is stopped when leaving the page
window.addEventListener('beforeunload', function () {
    try {
        navigator.sendBeacon('/stop_camera');
    } catch (e) {
        fetch('/stop_camera', {method:'POST', keepalive:true});
    }
});
</script>

</div>

</body>
</html>
